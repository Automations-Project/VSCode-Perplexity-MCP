name: Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to release"
        type: choice
        options: [auto, extension, mcp-server, both]
      bump:
        description: "Version bump (ignored when target=auto)"
        type: choice
        options: [patch, minor, major]
        default: patch
      dry_run:
        description: "Dry run (no publish)"
        type: boolean
        default: false

env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Smart bump versions (auto)
        if: inputs.target == 'auto'
        id: smart_bump
        run: |
          node scripts/bump-version.mjs
          MCP_VERSION=$(node -p "require('./packages/mcp-server/package.json').version")
          EXT_VERSION=$(node -p "require('./packages/extension/package.json').version")
          TAG=$(git describe --tags --abbrev=0)
          MCP_OLD=$(git show "${TAG}:packages/mcp-server/package.json" 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "0.0.0")
          EXT_OLD=$(git show "${TAG}:packages/extension/package.json" 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "0.0.0")
          if [ "$MCP_VERSION" != "$MCP_OLD" ]; then echo "mcp_changed=true" >> "$GITHUB_OUTPUT"; else echo "mcp_changed=false" >> "$GITHUB_OUTPUT"; fi
          if [ "$EXT_VERSION" != "$EXT_OLD" ]; then echo "ext_changed=true" >> "$GITHUB_OUTPUT"; else echo "ext_changed=false" >> "$GITHUB_OUTPUT"; fi
          echo "mcp_version=${MCP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "ext_version=${EXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Bump and publish MCP server
        if: (inputs.target == 'mcp-server' || inputs.target == 'both') || (inputs.target == 'auto' && steps.smart_bump.outputs.mcp_changed == 'true')
        run: |
          if [ "${{ inputs.target }}" != "auto" ]; then
            cd packages/mcp-server
            npm version ${{ inputs.bump }} --no-git-tag-version
          fi
          if [ "${{ inputs.dry_run }}" = "false" ]; then
            cd packages/mcp-server
            npm publish --provenance --access public
          else
            echo "DRY RUN: would publish v$(node -p "require('./packages/mcp-server/package.json').version" 2>/dev/null || node -p "require('./package.json').version")"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Bump and publish extension
        if: (inputs.target == 'extension' || inputs.target == 'both') || (inputs.target == 'auto' && steps.smart_bump.outputs.ext_changed == 'true')
        run: |
          if [ "${{ inputs.target }}" != "auto" ]; then
            cd packages/extension
            npm version ${{ inputs.bump }} --no-git-tag-version
          fi
          cd packages/extension
          npm run prepare:package-deps
          if [ "${{ inputs.dry_run }}" = "false" ]; then
            npx @vscode/vsce publish --no-dependencies
          else
            npx @vscode/vsce package --no-dependencies
            echo "DRY RUN: VSIX packaged but not published"
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Commit version bumps and tag
        if: inputs.dry_run == false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=$(node -p "require('./packages/extension/package.json').version")
          git add -A
          git commit -m "release: ${{ inputs.target }} v${VERSION}" || true
          git tag "v${VERSION}"
          git push && git push --tags
