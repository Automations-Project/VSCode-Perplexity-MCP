name: Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to release"
        type: choice
        options: [extension, mcp-server, both]
      bump:
        description: "Version bump"
        type: choice
        options: [patch, minor, major]
      dry_run:
        description: "Dry run (no publish)"
        type: boolean
        default: false

env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Bump and publish MCP server
        if: inputs.target == 'mcp-server' || inputs.target == 'both'
        run: |
          cd packages/mcp-server
          npm version ${{ inputs.bump }} --no-git-tag-version
          if [ "${{ inputs.dry_run }}" = "false" ]; then
            npm publish --provenance --access public
          else
            echo "DRY RUN: would publish v$(node -p 'require("./package.json").version')"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Bump and publish extension
        if: inputs.target == 'extension' || inputs.target == 'both'
        run: |
          cd packages/extension
          npm version ${{ inputs.bump }} --no-git-tag-version
          npm run prepare:package-deps
          if [ "${{ inputs.dry_run }}" = "false" ]; then
            npx @vscode/vsce publish --no-dependencies
          else
            npx @vscode/vsce package --no-dependencies
            echo "DRY RUN: VSIX packaged but not published"
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Commit version bumps and tag
        if: inputs.dry_run == false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=$(node -p "require('./packages/extension/package.json').version")
          git add -A
          git commit -m "release: ${{ inputs.target }} v${VERSION}" || true
          git tag "v${VERSION}"
          git push && git push --tags
