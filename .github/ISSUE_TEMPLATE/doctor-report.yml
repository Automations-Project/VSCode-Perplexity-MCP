name: "Doctor report (auto-generated)"
description: "Auto-submitted by the Perplexity MCP extension/CLI doctor command."
title: "[auto] Doctor failure: "
labels: ["bug", "doctor", "auto-report"]
body:
  - type: markdown
    attributes:
      value: |
        This report was generated by `perplexity-user-mcp doctor`. The body is redacted client-side before opening this URL — no email, userId, cookie, home path, or long opaque token should appear below. Review before submitting.
  - type: input
    id: category
    attributes:
      label: Category
      description: "runtime / config / profiles / vault / browser / native-deps / network / ide / mcp / probe"
    validations:
      required: true
  - type: input
    id: check
    attributes:
      label: Check name
    validations:
      required: true
  - type: textarea
    id: report
    attributes:
      label: Redacted report
      description: "Pre-filled by the doctor URL. Do not remove the redaction notice."
      render: markdown
    validations:
      required: true
  - type: checkboxes
    id: consent
    attributes:
      label: Consent
      options:
        - label: "I have reviewed the redacted body and it contains no secrets."
          required: true
        - label: "I understand this report is public once submitted."
          required: true
